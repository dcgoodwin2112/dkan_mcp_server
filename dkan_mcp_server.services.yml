services:
  dkan_mcp_server.logger_channel:
    parent: logger.channel_base
    arguments: ['dkan_mcp_server']

  # DKAN tool-logic services, reused verbatim from the original dkan_mcp module.
  # Framework-neutral wrappers over DKAN's services; the #[Tool] plugins delegate
  # to them (reads from dkan_query_tools.* go direct to those shared services).
  dkan_mcp_server.tools.write:
    class: Drupal\dkan_mcp_server\Tools\WriteTools
    arguments:
      - '@dkan.metastore.service'
      - '@dkan.datastore.service'
      - '@dkan_mcp_server.logger_channel'

  dkan_mcp_server.tools.harvest:
    class: Drupal\dkan_mcp_server\Tools\HarvestTools
    arguments:
      - '@dkan.harvest.service'
      - '@dkan_mcp_server.logger_channel'

  dkan_mcp_server.tools.resource:
    class: Drupal\dkan_mcp_server\Tools\ResourceTools
    arguments:
      - '@dkan.metastore.service'
      - '@dkan.metastore.resource_mapper'
      - '@dkan.datastore.service'
      - '@dkan.common.dataset_info'
      - '@dkan_query_tools.datastore'

  dkan_mcp_server.tools.status:
    class: Drupal\dkan_mcp_server\Tools\StatusTools
    arguments:
      - '@dkan.metastore.service'
      - '@dkan.common.dataset_info'
      - '@dkan.harvest.service'
      - '@module_handler'
      - '@extension.list.module'
      - '@queue'
      - '@plugin.manager.queue_worker'

  # Enforces each tool plugin's self-declared access (checkToolAccess) that
  # mcp_server core declares but never invokes: denies tools/call and hides
  # tools from tools/list. Works on both HTTP and STDIO. Also enforces the
  # operational disabled_groups setting (config.factory) on both gates.
  dkan_mcp_server.tool_access_subscriber:
    class: Drupal\dkan_mcp_server\EventSubscriber\ToolAccessSubscriber
    arguments:
      - '@plugin.manager.mcp_server.tool'
      - '@current_user'
      - '@config.factory'
    tags:
      - { name: event_subscriber }

  # Renders prompts/get correctly until two upstream mcp_server defects land
  # (content list double-encoding + no {{ arg }} substitution). Regenerates the
  # result from the mcp_prompt_config entity + request args. Remove with the
  # pins bump once upstream fixes both. Works on both HTTP and STDIO.
  dkan_mcp_server.prompt_render_subscriber:
    class: Drupal\dkan_mcp_server\EventSubscriber\PromptRenderSubscriber
    arguments:
      - '@entity_type.manager'
    tags:
      - { name: event_subscriber }

  # Advertises DKAN MCP OAuth scopes in RFC 9728 protected resource metadata.
  # It self-disables when simple_oauth_21 is not installed.
  dkan_mcp_server.resource_metadata_subscriber:
    class: Drupal\dkan_mcp_server\EventSubscriber\ResourceMetadataSubscriber
    arguments:
      - '@entity_type.manager'
    tags:
      - { name: event_subscriber }

  # Optionally adds basic_auth to the mcp_server.handle route (gated by the
  # dkan_mcp_server.settings:http_basic_auth flag, default off; skipped when the
  # optional basic_auth module is not enabled).
  dkan_mcp_server.route_subscriber:
    class: Drupal\dkan_mcp_server\Routing\RouteSubscriber
    arguments:
      - '@config.factory'
      - '@module_handler'
    tags:
      - { name: event_subscriber }

  # Emits an RFC 9728 Bearer/resource_metadata challenge on anonymous MCP
  # 401/403 responses (OAuth-only mode) so clients can discover the OAuth flow.
  dkan_mcp_server.unauthorized_challenge_subscriber:
    class: Drupal\dkan_mcp_server\EventSubscriber\UnauthorizedChallengeSubscriber
    arguments:
      - '@config.factory'
      - '@current_user'
      - '@module_handler'
      - '@url_generator'
    tags:
      - { name: event_subscriber }
